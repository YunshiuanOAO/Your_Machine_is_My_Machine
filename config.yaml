runtime:
  env: dev
  max_retries: 2
  max_tasks: 3
  run_timeout_seconds: 3600

model:
  provider: anthropic
  name: claude-sonnet-4-6

paths:
  report_dir: reports
  knowledge_base_path: my_knowledge_base
  web_wordlist: /usr/share/dirb/wordlists/common.txt

rag:
  collection_name: hacktricks_kb
  top_k: 3
  max_snippets: 6
  snippet_budget_chars: 2000

observability:
  langsmith_tracing: false
  langsmith_project: pentestagent-dev

tools:
  allowed:
    - rustscan
    - nmap
    - dirsearch
    - whatweb
    - searchsploit
    - msfconsole
    - curl

timeouts:
  command_seconds: 300
  scan_seconds: 300
  web_scan_seconds: 180

execution:
  auto_approve: false
  allow_interactive: false
  decision_backend: codex
  codex_decision_timeout_seconds: 60
  codex_decision_worker_command: node scripts/codex_decision_worker.mjs
  exploit_dispatch: sequential
  max_parallel_exploit_agents: 3
  decision_max_rounds: 3
  # Enable Codex SDK fan-out mode with:
  # exploit_dispatch: codex_parallel
  # codex_worker_command: node scripts/codex_exploit_worker.mjs
