# Kali/HTB environment overrides.
# Layered on top of config.yaml (see ADR-02). Only override what differs.
runtime:
  env: kali
  # Global retry-cycle budget for the whole run. Bumped above the dev default
  # so multi-service targets get more exploration before the run reports out.
  max_retries: 4
  run_timeout_seconds: 3600

observability:
  langsmith_project: pentestagent-kali

paths:
  # Kali's packaged wordlists live under /usr/share/wordlists. The preflight
  # treats this as advisory because operators may choose a target-specific list.
  web_wordlist: /usr/share/dirb/wordlists/common.txt

timeouts:
  # Full-range RustScan scans against a live HTB box are slower than a local
  # lab target; give them more headroom.
  scan_seconds: 600
  # Web enumeration can legitimately take several minutes. The executor caps
  # every tool by command_seconds, so keep this at least as high as web scans.
  command_seconds: 900
  web_scan_seconds: 900

execution:
  # Keep human approval on for live targets. Interactive stays off in v1.
  auto_approve: false
  allow_interactive: false
  exploit_dispatch: sequential
  max_parallel_exploit_agents: 3
  decision_max_rounds: 3
